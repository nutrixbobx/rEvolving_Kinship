# Copy this to .streamlit/secrets.toml LOCALLY for development, or paste
# the equivalent in the Streamlit Cloud dashboard:
# App settings → Secrets → Edit secrets.
#
# Note: secrets.toml itself is gitignored. Only this example file is committed.

# === Required for cloud deployment ===

# Your Supabase Postgres connection string. Find it in Supabase:
# Project Settings → Database → Connection string → URI
# Then prefix with the SQLAlchemy driver, postgresql+psycopg2://
DATABASE_URL = "postgresql+psycopg2://postgres:YOUR-PASSWORD@db.YOUR-PROJECT.supabase.co:5432/postgres"

# === Optional but recommended ===

# Gate the admin override controls in the dashboard.
ADMIN_PASSWORD = "your-admin-password-here"

# Xeno-canto v3 API key for higher-quality species recordings.
# https://xeno-canto.org/account
XENO_CANTO_API_KEY = "your-xeno-canto-key-here"

# Groq API key for the AI blurb (free tier available at https://console.groq.com).
GROQ_API_KEY = "your-groq-key-here"

# Hugging Face Inference token (fallback for the AI blurb).
HF_TOKEN = "your-hf-token-here"

# Optional: point at a pre-built NCBI taxonomy file. Leave unset to use
# ete3's default (~/.etetoolkit/taxa.sqlite).
# NCBI_TAXA_DB = "/path/to/taxa.sqlite"
