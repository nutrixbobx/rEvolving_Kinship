<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="600" fill="#0e1b1a"/>
  <text x="450" y="40" fill="#e8f3ef" font-size="24" font-weight="bold" text-anchor="middle">{r}Evolving Kinship: install sketch (one night, Goat Farm)</text>
  <text x="450" y="66" fill="#8fb3a8" font-size="14" text-anchor="middle">projection + request station + sonification, on a darkened wall in the Proctor Creek watershed</text>

  <!-- Projection wall -->
  <rect x="60" y="100" width="470" height="320" rx="6" fill="#13302c" stroke="#3c6b60" stroke-width="2"/>
  <text x="295" y="125" fill="#8fb3a8" font-size="13" text-anchor="middle">brick wall or scrim (~10 ft+ wide)</text>

  <!-- Phylogenetic tree on the wall -->
  <g stroke="#7fe3c4" stroke-width="2.5" fill="none">
    <path d="M120 360 L210 360 L210 230 L300 230"/>
    <path d="M210 360 L210 330 L300 330"/>
    <path d="M300 230 L300 180 L400 180"/>
    <path d="M300 230 L300 285 L400 285"/>
    <path d="M300 330 L300 380 L400 380"/>
    <path d="M120 360 L120 410 L400 410"/>
  </g>
  <g fill="#e8f3ef" font-size="12">
    <circle cx="400" cy="180" r="4" fill="#ffd97a"/><text x="410" y="184">Homo sapiens</text>
    <circle cx="400" cy="285" r="4" fill="#7fe3c4"/><text x="410" y="289">coyote</text>
    <circle cx="400" cy="380" r="4" fill="#7fe3c4"/><text x="410" y="384">white oak</text>
    <circle cx="400" cy="410" r="4" fill="#7fe3c4"/><text x="410" y="414">creek crayfish</text>
  </g>
  <text x="150" y="350" fill="#8fb3a8" font-size="11" transform="rotate(-90 150 350)">deep time →</text>

  <!-- Projector -->
  <rect x="560" y="250" width="70" height="40" rx="5" fill="#26483f" stroke="#3c6b60"/>
  <text x="595" y="312" fill="#8fb3a8" font-size="11" text-anchor="middle">projector</text>
  <path d="M560 270 L530 230 M560 270 L530 320" stroke="#ffd97a" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Request station -->
  <rect x="600" y="360" width="120" height="80" rx="6" fill="#13302c" stroke="#3c6b60" stroke-width="2"/>
  <rect x="625" y="378" width="70" height="44" rx="3" fill="#0e1b1a" stroke="#7fe3c4"/>
  <text x="660" y="404" fill="#7fe3c4" font-size="11" text-anchor="middle">tablet</text>
  <text x="660" y="458" fill="#e8f3ef" font-size="12" text-anchor="middle" font-weight="bold">request station</text>
  <text x="660" y="476" fill="#8fb3a8" font-size="11" text-anchor="middle">"name a species</text>
  <text x="660" y="490" fill="#8fb3a8" font-size="11" text-anchor="middle">you feel kin to"</text>

  <!-- Speaker / sonification -->
  <rect x="760" y="360" width="60" height="90" rx="6" fill="#26483f" stroke="#3c6b60"/>
  <circle cx="790" cy="390" r="14" fill="#0e1b1a" stroke="#7fe3c4"/>
  <circle cx="790" cy="425" r="9" fill="#0e1b1a" stroke="#7fe3c4"/>
  <text x="790" y="470" fill="#8fb3a8" font-size="11" text-anchor="middle">speaker</text>
  <g stroke="#ffd97a" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M824 380 q12 25 0 50"/>
    <path d="M832 372 q20 40 0 66"/>
  </g>
  <text x="846" y="408" fill="#8fb3a8" font-size="10">sonification</text>

  <!-- Visitors -->
  <g fill="#8fb3a8">
    <circle cx="470" cy="500" r="10"/><rect x="462" y="512" width="16" height="26" rx="6"/>
    <circle cx="510" cy="510" r="10"/><rect x="502" y="522" width="16" height="26" rx="6"/>
    <circle cx="430" cy="512" r="10"/><rect x="422" y="524" width="16" height="26" rx="6"/>
  </g>
  <text x="470" y="565" fill="#8fb3a8" font-size="11" text-anchor="middle">visitors gather, watch their kin join the tree</text>

  <!-- Living kin note -->
  <path d="M70 470 q15 -30 30 0 q15 -30 30 0" stroke="#7fe3c4" stroke-width="2" fill="none"/>
  <rect x="96" y="470" width="6" height="40" fill="#5a4632"/>
  <text x="70" y="535" fill="#8fb3a8" font-size="11">actual plants / tree line nearby:</text>
  <text x="70" y="550" fill="#8fb3a8" font-size="11">projected kin sit beside living kin</text>
</svg>
